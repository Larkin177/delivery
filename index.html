<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CC-Installer 发货助手</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--surface:#fff;--border:#e2e5ed;--text:#1a1d29;
  --text2:#6b7085;--muted:#9ca3b0;--brand:#6366f1;--brand2:#4f46e5;
  --ok:#22c55e;--err:#ef4444;--r:10px;--rs:6px
}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased
}
#app{max-width:500px;margin:0 auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:10px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.section-title{font-size:14px;font-weight:700;margin-bottom:10px}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
input,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--bg);outline:none}
input:focus,textarea:focus{border-color:var(--brand);background:white}
textarea{font-family:monospace;font-size:12px;line-height:1.6;resize:vertical;min-height:100px}
.inline{display:flex;align-items:center;gap:8px}
.inline label{margin-bottom:0;flex-shrink:0}
.input-sm{width:70px}
.suffix{font-size:12px;color:var(--muted)}
.row{margin-bottom:10px}.row:last-child{margin-bottom:0}
.btn{
  width:100%;padding:15px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;
  cursor:pointer;background:linear-gradient(135deg,var(--brand),#818cf8);color:white;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(99,102,241,.3)
}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.6}
.status{margin-top:10px;text-align:center;font-size:13px;font-weight:600;min-height:20px}
.status.ok{color:var(--ok)}.status.err{color:var(--err)}
.preview{margin-top:10px;display:none}.preview.show{display:block}
.preview-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.preview-content{background:#1a1d29;color:#c4c8d4;padding:12px;border-radius:var(--rs);font-size:12px;white-space:pre-wrap;word-break:break-all;font-family:monospace;user-select:text}
.key-section{display:none}.key-section.show{display:block}
.key-status{font-size:11px;color:var(--muted);margin-top:4px}
.key-status.ok{color:var(--ok)}.key-status.err{color:var(--err)}
.hint{font-size:11px;color:var(--muted);margin-bottom:6px}
.hint code{font-size:11px;background:var(--bg);padding:1px 4px;border-radius:3px}
.history-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:var(--rs);cursor:pointer;font-size:12px}
.history-item:hover{background:var(--bg)}
.h-time{color:var(--muted);font-size:11px;min-width:44px}
.h-code{flex:1;font-family:monospace;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-status{color:var(--ok);font-size:11px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1d29;color:white;padding:10px 20px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.close-btn{position:absolute;top:8px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div class="toast" id="toast"></div>

  <div class="section">
    <div class="section-title">🔑 私钥设置 <span class="key-status" id="keyStatus">未加载</span></div>
    <div class="key-section show" id="keySetup">
      <p style="font-size:12px;color:var(--text2);margin-bottom:8px">首次使用请粘贴私钥（之后会保存在本地浏览器中）</p>
      <textarea id="keyInput" placeholder="粘贴 private.pem 内容..." rows="4"></textarea>
      <button class="btn" id="btnSaveKey" style="margin-top:8px;padding:10px;font-size:14px">保存私钥</button>
    </div>
    <div id="keyLoaded" style="display:none">
      <span style="color:var(--ok);font-size:13px">✅ 私钥已加载</span>
      <button id="btnClearKey" style="margin-left:8px;font-size:11px;color:var(--err);background:none;border:none;cursor:pointer">清除</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">🔗 发货配置</div>
    <div class="row"><label>百度网盘链接</label><input type="text" id="link" placeholder="https://pan.baidu.com/s/..."></div>
    <div class="row"><label>提取码</label><input type="text" id="extract" placeholder="请输入提取码" maxlength="6"></div>
    <div class="row inline"><label>有效期</label><input type="number" id="hours" class="input-sm" value="3" min="1" max="720"><span class="suffix">小时</span></div>
  </div>

  <button class="btn" id="btnGenerate"><span>🔑</span><span>生成授权码并复制</span></button>
  <div class="status" id="status"></div>
  <div class="preview" id="preview">
    <div class="preview-label">📋 已复制到剪贴板：</div>
    <pre class="preview-content" id="previewContent"></pre>
  </div>

  <div class="section">
    <div class="section-title">💬 消息模板</div>
    <p class="hint">变量: <code>{link}</code> <code>{extract}</code> <code>{code}</code> <code>{hours}</code> <code>{expiresAt}</code></p>
    <textarea id="template" rows="6">【CC-Installer 一键安装工具】

下载链接: {link}
提取码: {extract}

授权码: {code}
⏰ 有效期 {hours} 小时（至 {expiresAt}），请尽快激活使用

安装教程见网盘内的使用指南文档</textarea>
  </div>

  <div class="section" style="flex:1">
    <div class="section-title">📜 发货记录</div>
    <div id="history"></div>
  </div>
</div>

<script>
// ====== State ======
const LS_KEY = 'cc-delivery-key';
const LS_CFG = 'cc-delivery-cfg';
const LS_HIST = 'cc-delivery-hist';

let privateKeyPem = localStorage.getItem(LS_KEY) || '';
let cryptoKey = null;
let cfg = JSON.parse(localStorage.getItem(LS_CFG) || '{"link":"","extract":"","hours":3,"template":""}');
let history = JSON.parse(localStorage.getItem(LS_HIST) || '[]');

// ====== DOM ======
const $ = id => document.getElementById(id);
const keySetup = $('keySetup'), keyLoaded = $('keyLoaded'), keyStatus = $('keyStatus');
const btnSaveKey = $('btnSaveKey'), btnClearKey = $('btnClearKey');
const btnGenerate = $('btnGenerate'), statusEl = $('status');
const previewEl = $('preview'), previewContent = $('previewContent');
const defaultTpl = $('template').value;

// ====== Init ======
function init() {
  $('link').value = cfg.link || '';
  $('extract').value = cfg.extract || '';
  $('hours').value = cfg.hours || 3;
  $('template').value = cfg.template || defaultTpl;

  ['link','extract','hours','template'].forEach(id => {
    $(id).addEventListener('input', saveCfg);
  });

  if (privateKeyPem) {
    loadKey(privateKeyPem);
  }

  renderHistory();
}
init();

function saveCfg() {
  cfg = {
    link: $('link').value.trim(),
    extract: $('extract').value.trim(),
    hours: parseInt($('hours').value) || 3,
    template: $('template').value || defaultTpl,
  };
  localStorage.setItem(LS_CFG, JSON.stringify(cfg));
}

// ====== Key Management ======
async function loadKey(pem) {
  try {
    const pemContents = pem.trim();
    const b64 = pemContents
      .replace('-----BEGIN PRIVATE KEY-----', '')
      .replace('-----END PRIVATE KEY-----', '')
      .replace(/\s/g, '');
    const binary = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    cryptoKey = await crypto.subtle.importKey(
      'pkcs8', binary,
      { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
      false, ['sign']
    );
    keySetup.style.display = 'none';
    keyLoaded.style.display = 'block';
    keyStatus.textContent = '已加载';
    keyStatus.className = 'key-status ok';
    localStorage.setItem(LS_KEY, pem);
    privateKeyPem = pem;
    return true;
  } catch(e) {
    keyStatus.textContent = '密钥格式错误';
    keyStatus.className = 'key-status err';
    return false;
  }
}

btnSaveKey.addEventListener('click', async () => {
  const pem = $('keyInput').value.trim();
  if (!pem) return;
  btnSaveKey.disabled = true;
  btnSaveKey.textContent = '加载中...';
  const ok = await loadKey(pem);
  btnSaveKey.disabled = false;
  btnSaveKey.textContent = '保存私钥';
  if (ok) showToast('私钥已保存');
});

btnClearKey.addEventListener('click', () => {
  localStorage.removeItem(LS_KEY);
  privateKeyPem = '';
  cryptoKey = null;
  keySetup.style.display = 'block';
  keyLoaded.style.display = 'none';
  keyStatus.textContent = '未加载';
  keyStatus.className = 'key-status';
});

// ====== Generate ======
btnGenerate.addEventListener('click', async () => {
  if (!cryptoKey) {
    setStatus('请先设置私钥', 'err');
    return;
  }
  const link = $('link').value.trim();
  const extract = $('extract').value.trim();
  if (!link) { setStatus('请填写百度网盘链接', 'err'); return; }
  if (!extract) { setStatus('请填写提取码', 'err'); return; }

  btnGenerate.disabled = true;
  btnGenerate.querySelector('span:last-child').textContent = '生成中...';
  setStatus('', '');

  try {
    const hours = parseInt($('hours').value) || 3;
    const codeId = crypto.randomUUID().replace(/-/g, '').substring(0, 12).toUpperCase();
    const now = Math.floor(Date.now() / 1000);
    const payload = { id: codeId, exp: now + hours * 3600, iat: now, ver: 1 };
    const payloadJson = JSON.stringify(payload);
    const payloadBase64 = btoa(unescape(encodeURIComponent(payloadJson)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

    const encoder = new TextEncoder();
    const sigBuf = await crypto.subtle.sign(
      'RSASSA-PKCS1-v1_5', cryptoKey, encoder.encode(payloadBase64)
    );
    const sigBase64 = btoa(String.fromCharCode(...new Uint8Array(sigBuf)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');

    const code = `AIC-${payloadBase64}.${sigBase64}`;
    const expiresAt = new Date(payload.exp * 1000).toLocaleString('zh-CN');

    const tpl = ($('template').value || defaultTpl)
      .replace(/\{link\}/g, link)
      .replace(/\{extract\}/g, extract)
      .replace(/\{code\}/g, code)
      .replace(/\{hours\}/g, String(hours))
      .replace(/\{expiresAt\}/g, expiresAt);

    await navigator.clipboard.writeText(tpl);
    previewContent.textContent = tpl;
    previewEl.classList.add('show');

    history.push({
      time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
      code, codeId, expiresAt, ts: Date.now()
    });
    history = history.slice(-200);
    localStorage.setItem(LS_HIST, JSON.stringify(history));
    renderHistory();

    setStatus('✅ 已复制到剪贴板', 'ok');
    showToast('已复制到剪贴板');
  } catch(err) {
    setStatus('错误: ' + err.message, 'err');
  } finally {
    btnGenerate.disabled = false;
    btnGenerate.querySelector('span:last-child').textContent = '生成授权码并复制';
  }
});

// ====== History ======
function renderHistory() {
  const el = $('history');
  if (history.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">暂无记录</div>';
    return;
  }
  el.innerHTML = [...history].reverse().map((r, i) => {
    const realIdx = history.length - 1 - i;
    const short = r.code.length > 40 ? r.code.substring(0, 20) + '...' : r.code;
    return `<div class="history-item" data-idx="${realIdx}">
      <span class="h-time">${r.time}</span>
      <span class="h-code">${short}</span>
      <span class="h-status">✅</span>
    </div>`;
  }).join('');
}

$('history').addEventListener('click', async (e) => {
  const item = e.target.closest('.history-item');
  if (!item) return;
  const rec = history[parseInt(item.dataset.idx)];
  if (!rec) return;
  const tpl = ($('template').value || defaultTpl)
    .replace(/\{link\}/g, $('link').value.trim())
    .replace(/\{extract\}/g, $('extract').value.trim())
    .replace(/\{code\}/g, rec.code)
    .replace(/\{hours\}/g, String(cfg.hours || 3))
    .replace(/\{expiresAt\}/g, rec.expiresAt);
  await navigator.clipboard.writeText(tpl);
  showToast('已重新复制');
});

// ====== Helpers ======
function setStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + (type || '');
}
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
